version: "3.9"

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/receptionist
      - OLLAMA_URL=http://host.docker.internal:11434  # Ollama runs on your host machine
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Postgres + pgvector ──────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: receptionist
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
